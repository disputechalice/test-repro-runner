name: repro-checks

on:
  workflow_call:
    inputs:
      git-url:
        required: true
        type: string
      git-ref:
        required: true
        type: string

defaults:
  run:
    shell: bash

jobs:

  prepare:
    runs-on: ubuntu-latest

    outputs:
      buildenv: ${{ steps.resolve-context.outputs.buildenv }}
      buildprov: ${{ steps.resolve-context.outputs.buildprov }}      

    steps:
      - name: Kit
        uses: disputechalice/test-gh-actions/source-archive@main
        with:
          git-url: https://github.com/"$GITHUB_REPOSITORY".git
          git-ref: main
          name: kit

      - id: source
        name: Source
        uses: disputechalice/test-gh-actions/source-archive@main
        with:
          git-url: ${{ inputs.git-url }}
          git-ref: ${{ inputs.git-ref }}
          name: source
          permsrc: true
          artifact: true

      - id: acquire-buildmeta
        name: Acquire buildmeta file
        run: |
          found_buildmeta=(source/*.buildmeta)
          ((${#found_buildmeta[@]} == 1))
          buildmeta=${found_buildmeta[0]}
          [[ -f $buildmeta ]]
          echo "file=$buildmeta" >> $GITHUB_OUTPUT

      - id: source-buildmeta
        name: Source buildmeta file
        uses: disputechalice/test-gh-actions/env-to-json@main
        with:
          sfile: ${{ steps.acquire-buildmeta.outputs.file }}
          vnames: SOURCE_DATE_EPOCH DPKG_DEB_COMPRESSOR_TYPE DEB_SHA256 DEB_URL

      - id: resolve-context
        name: Resolve build context
        run: |
          buildmeta="${{ steps.acquire-buildmeta.outputs.file }}"
          buildmeta_fname=${buildmeta##*/}
          buildmeta_fname_bare="${buildmeta_fname%%.buildmeta}"

          deb_package=${buildmeta_fname_bare%%_*}
          deb_version=${buildmeta_fname_bare#*_}

          meta='${{ steps.source-buildmeta.outputs.json }}'

          buildenv=$(jq -c \
            '{
              source_date_epoch,
              dpkg_deb_compressor_type
            }' <<< "$meta")

          buildprov=$(jq -c \
            --arg git_url "${{ inputs.git-url }}" \
            --arg git_commit "${{ steps.source.outputs.git-commit }}" \
            --arg deb_package "$deb_package" \
            --arg deb_version "$deb_version" \
            '{
              git_url: $git_url,              
              git_commit: $git_commit,
              deb_package: $deb_package,
              deb_version: $deb_version,
              deb_sha256: .deb_sha256,
              deb_url: .deb_url
          }' <<< "$meta")

          cat >> $GITHUB_OUTPUT << EOF
          buildenv=$buildenv
          buildprov=$buildprov
          EOF

  repro:  
    needs: prepare
    runs-on: ubuntu-latest
    container: ghcr.io/disputechalice/builder-simple:latest

    env:
      DEB_PACKAGE: ${{ fromJson(needs.prepare.outputs.buildprov).deb_package }}
      DEB_VERSION: ${{ fromJson(needs.prepare.outputs.buildprov).deb_version }}
      DEB_SHA256: ${{ fromJson(needs.prepare.outputs.buildprov).deb_sha256 }}
      SOURCE_DATE_EPOCH: ${{ fromJson(needs.prepare.outputs.buildenv).source_date_epoch }}
      DPKG_DEB_COMPRESSOR_TYPE: ${{ fromJson(needs.prepare.outputs.buildenv).dpkg_deb_compressor_type }}

    outputs:
      status: ${{ steps.check.outputs.status }}

    steps:
      - name: Get source archive
        uses: disputechalice/test-gh-actions/fetch-artifact-tar@main
        with:
          name: source.tar

      - id: check
        name: Check if build can be reproduced
        run: |
          : "${DEB_PACKAGE:?}" "${DEB_VERSION:?}" "${DEB_SHA256:?}"
          : "${SOURCE_DATE_EPOCH:?}" "${DPKG_DEB_COMPRESSOR_TYPE:?}"

          src_dir=source

          built_deb=$(mktemp /tmp/repro.XXXXXX.deb)
          export SOURCE_DATE_EPOCH DPKG_DEB_COMPRESSOR_TYPE
          dpkg-deb --build --root-owner-group "$src_dir/$DEB_PACKAGE" "$built_deb"

          read -r built_package built_version <<< \
            "$(dpkg-deb --show --showformat='${Package} ${Version}\n' "$built_deb")"

          [[ $DEB_PACKAGE == "$built_package" ]]
          [[ $DEB_VERSION == "$built_version" ]]

          sha256sum --check <<< "$DEB_SHA256  $built_deb"

          cat >> $GITHUB_OUTPUT << EOF
          status=pass
          EOF

  dist:
    needs: prepare
    runs-on: ubuntu-latest

    env:
      DEB_SHA256: ${{ fromJson(needs.prepare.outputs.buildprov).deb_sha256 }}
      DEB_URL: ${{ fromJson(needs.prepare.outputs.buildprov).deb_url }}

    outputs:
      status: ${{ steps.check.outputs.status }}
    steps:
      - id: check
        name: Check if distributed package checksum matches
        run: |
          : "${DEB_SHA256:?}" "${DEB_URL:?}"

          dist_deb=$(mktemp /tmp/dist.XXXXXX.deb)
          wget --no-verbose -O "$dist_deb" "$DEB_URL"
          sha256sum --check <<< "$DEB_SHA256  $dist_deb"

          cat >> $GITHUB_OUTPUT << EOF
          status=pass
          EOF

  report:
    needs: [prepare, repro, dist]
    runs-on: ubuntu-latest

    env:
      GIT_URL: ${{ fromJson(needs.prepare.outputs.buildprov).git_url }}
      GIT_COMMIT: ${{ fromJson(needs.prepare.outputs.buildprov).git_commit }}
      DEB_PACKAGE: ${{ fromJson(needs.prepare.outputs.buildprov).deb_package }}
      DEB_VERSION: ${{ fromJson(needs.prepare.outputs.buildprov).deb_version }}
      DEB_URL: ${{ fromJson(needs.prepare.outputs.buildprov).deb_url }}
      DEB_SHA256: ${{ fromJson(needs.prepare.outputs.buildprov).deb_sha256 }}
      STATUS_REPRO: ${{ needs.repro.outputs.status }}
      STATUS_DIST: ${{ needs.dist.outputs.status }}

    steps:
      - name: Report summary
        run: |
          : "${GIT_URL:?}" "${GIT_COMMIT:?}"           
          : "${DEB_PACKAGE:?}" "${DEB_VERSION:?}" "${DEB_URL:?}" "${DEB_SHA256:?}"

          tee -a "report.md" >&2 << EOF

          # Report
          As of: **$(date --rfc-3339=seconds --utc)**

          | Package | *$DEB_PACKAGE* |
          |---------|----------------|
          | Version | *$DEB_VERSION* |
          EOF


          tee -a "report.md" >&2 << EOF

          ## Reproducible build

          | Verified          | ${STATUS_REPRO:-fail} |
          |-------------------|-----------------------|
          | Package checksum  | $DEB_SHA256           |          
          | Source Git URL    | [$GIT_URL]($GIT_URL)  |
          | Source Git commit | $GIT_COMMIT           |

          EOF


          tee -a "report.md" >&2 << EOF

          ## Distributed package

          | Verified         | ${STATUS_DIST:-fail} |
          |------------------|----------------------|
          | Package checksum | $DEB_SHA256          |
          | Package URL      | [$DEB_URL]($DEB_URL) |
          EOF


          cat report.md >> $GITHUB_STEP_SUMMARY

          [[ "$STATUS_REPRO" == "pass" ]]
          [[ "$STATUS_DIST" == "pass" ]]
