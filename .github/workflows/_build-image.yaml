name: "[Build image]"

on:
  workflow_call:
    inputs:
      git-url:
        required: true
        type: string
      git-ref:
        required: false
        type: string
        default: main
      def-name:
        required: true
        type: string
      image-name:
        required: true
        type: string
      image-tags:
        required: false
        type: string
        default: '["latest"]'

defaults:
  run:
    shell: bash

env:
  GIT_URL: ${{ inputs.git-url }}
  GIT_REF: ${{ inputs.git-ref }}
  CR_URL: ghcr.io/${{ github.repository_owner }}
  IMAGE_NAME: ${{ inputs.image-name }}
  IMAGE_TAGS: ${{ inputs.image-tags }}

jobs:
  create:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Prep runner toolset
        uses: disputechalice/test-gh-actions/apt-satisfy@main
        with:
          expression: >
            debian-archive-keyring
            bdebstrap
            buildah
            podman

      - id: def
        name: Fetch def tree
        uses: disputechalice/test-gh-actions/tree-from-git-ref@main
        with:
          git-url: ${{ env.GIT_URL }}
          git-ref: ${{ env.GIT_REF }}

      - id: build
        name: Build image
        env:
          SOURCE_DATE_EPOCH: ${{ steps.def.outputs.git-commit-epoch }}
          IMAGE_SOURCE: ${{ inputs.git-url }}
          IMAGE_REVISION: ${{ steps.def.outputs.git-commit }}
          BUILD: ${{ steps.def.outputs.path }}/${{ inputs.def-name }}/build
        run: |
          export SOURCE_DATE_EPOCH IMAGE_{NAME,SOURCE,REVISION}

          buildah unshare "$BUILD"

          tee -a "$GITHUB_OUTPUT" >&2 << EOF
          rootfs-diffids=$(buildah inspect "$IMAGE_NAME" | jq -c '.OCIv1.rootfs.diff_ids')
          EOF

      - name: Check image
        run: |
          source <(podman run --pull=never "$IMAGE_NAME" cat /etc/os-release)
          [[ $ID == debian ]]

      - id: push
        name: Push to Registry
        env:
          RUN_ID: ${{ github.run_id }}
        run: |
          buildah login ghcr.io \
            -u "${{ github.actor }}" \
            --password-stdin <<< "${{ secrets.GITHUB_TOKEN }}"

          IMAGE_REPO="$CR_URL/$IMAGE_NAME"

          for tag in $(echo $IMAGE_TAGS | jq -r '.[]'); do
            buildah tag "$IMAGE_NAME" "$IMAGE_REPO:$tag"
            buildah push --digestfile digest "$IMAGE_REPO:$tag"
            echo "Pushed with tag: $tag"
          done

          tee -a "$GITHUB_OUTPUT" >&2 << EOF
          image-repo=$IMAGE_REPO
          image-digest=$(cat digest)
          EOF

      - name: Summarize
        env:
          ROOTFS_DIFFID0: ${{ fromJSON(steps.build.outputs.rootfs-diffids)[0] }}
          IMAGE_REPO: ${{ steps.push.outputs.image-repo }}
          IMAGE_DIGEST: ${{ steps.push.outputs.image-digest }}
          GIT_COMMIT: ${{ steps.def.outputs.git-commit }}
          TAR_SHA256: ${{ steps.def.outputs.tar-sha256 }}
          BS_YAML: ${{ steps.def.outputs.path }}/${{ inputs.def-name }}/bootstrap.yaml
        run: |
          # Build markdown summary
          trap 'echo >&2 E$? L$LINENO' ERR
          : "${IMAGE_DIGEST:?}"

          REPORT="$(mktemp /tmp/report.XXXXXX.md)"

          cat >> "$REPORT" << EOF

          $IMAGE_REPO : $IMAGE_TAG

          rootfs diffid 0: ${ROOTFS_DIFFID0#*:}

          pushed image: $IMAGE_DIGEST

          \`\`\`
          $(yq '.mmdebstrap.suite' "$BS_YAML")
          $(yq '.mmdebstrap.variant' "$BS_YAML")
          $(yq '.mmdebstrap.mirrors' "$BS_YAML")
          \`\`\`

          Image def:
          - from commit $GIT_COMMIT
          - tarball SHA256: $TAR_SHA256

          Manifest:

          EOF

          cat "$IMAGE_NAME/manifest" >> "$REPORT" ||:

          tee -a "$GITHUB_STEP_SUMMARY" >&2 < "$REPORT"
